spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-signing-algorithm
  expiration: 3600000

parkhere:
  decay:
    enabled: false
  geocoding:
    enabled: false
  analytics:
    enabled: false
  leaderboard:
    enabled: false
  images:
    upload-dir: /tmp/parkhere-test-uploads
    storage: local
